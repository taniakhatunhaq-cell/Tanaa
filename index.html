<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Construction - Fresh Finds, Best Prices</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #f8f9fa;
  line-height: 1.6;
}

/* HERO */
.hero {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
              url('https://i.ibb.co/JWwmpfvP/IMG-4778') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
  position: relative;
}

.hero-content {
  max-width: 600px;
  padding: 0 20px;
}

.hero h1 {
  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: 700;
  margin-bottom: 1rem;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

.hero p {
  font-size: 1.3rem;
  font-weight: 300;
  margin-bottom: 2rem;
}

.hero button {
  padding: 15px 40px;
  border: none;
  background: #ff6b35;
  color: white;
  font-size: 1.1rem;
  font-weight: 500;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 8px 25px rgba(255,107,53,0.4);
}

.hero button:hover {
  background: #e55a2b;
  transform: translateY(-2px);
  box-shadow: 0 12px 35px rgba(255,107,53,0.6);
}

/* PRODUCTS */
.products {
  padding: 80px 20px;
  max-width: 1400px;
  margin: 0 auto;
}

.section-title {
  text-align: center;
  font-size: 2.5rem;
  font-weight: 600;
  margin-bottom: 3rem;
  color: #333;
}

.carousel {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 30px;
  padding-bottom: 20px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 15px;
  margin-bottom: 15px;
}

.card h4 {
  font-size: 1.2rem;
  font-weight: 600;
  color: #333;
  margin-bottom: 8px;
}

.card p {
  font-size: 1.5rem;
  font-weight: 700;
  color: #ff6b35;
  margin-bottom: 15px;
}

.card button {
  width: 100%;
  padding: 12px;
  background: #333;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
}

.card button:hover {
  background: #555;
  transform: translateY(-2px);
}

/* CART */
.cart-icon {
  position: fixed;
  bottom: 90px;
  right: 25px;
  background: #333;
  color: white;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1.5rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  transition: all 0.3s ease;
  z-index: 1000;
}

.cart-icon:hover {
  background: #555;
  transform: scale(1.1);
}

.cart-count {
  position: absolute;
  top: -8px;
  right: -8px;
  background: #ff4757;
  color: white;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  font-weight: 600;
}

.cart-box {
  position: fixed;
  right: -400px;
  top: 0;
  width: 400px;
  height: 100vh;
  background: white;
  box-shadow: -5px 0 30px rgba(0,0,0,0.1);
  transition: right 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  z-index: 1001;
  overflow-y: auto;
  padding: 30px;
}

.cart-box.active {
  right: 0;
}

.cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  padding-bottom: 20px;
  border-bottom: 2px solid #f0f0f0;
}

.close-cart {
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  color: #666;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 0;
  border-bottom: 1px solid #eee;
}

.total {
  font-size: 1.3rem;
  font-weight: 700;
  color: #333;
  margin: 20px 0;
}

/* FORM */
.form-group {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 15px;
  border: 2px solid #eee;
  border-radius: 10px;
  font-size: 1rem;
  transition: border-color 0.3s ease;
}

input:focus {
  outline: none;
  border-color: #ff6b35;
}

.send-btn {
  background: #28a745;
  color: white;
  padding: 15px;
  border: none;
  border-radius: 10px;
  width: 100%;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

.send-btn:hover {
  background: #218838;
  transform: translateY(-2px);
}

.send-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
  transform: none;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 25px;
  right: 25px;
  background: #25D366;
  color: white;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  text-decoration: none;
  box-shadow: 0 10px 30px rgba(37,211,102,0.4);
  transition: all 0.3s ease;
  z-index: 1000;
  animation: pulse 2s infinite;
}

.whatsapp:hover {
  transform: scale(1.1);
  box-shadow: 0 15px 40px rgba(37,211,102,0.6);
}

@keyframes pulse {
  0% { box-shadow: 0 10px 30px rgba(37,211,102,0.4); }
  50% { box-shadow: 0 0 0 0 rgba(37,211,102,0.7); }
  100% { box-shadow: 0 10px 30px rgba(37,211,102,0.4); }
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .cart-box {
    width: 100%;
    right: -100%;
  }
  
  .products {
    padding: 60px 15px;
  }
  
  .carousel {
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
  }
}
</style>
</head>

<body>
<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>The Construction</h1>
    <p>Fresh Finds, Best Prices</p>
    <button onclick="scrollToProducts()">Shop Now</button>
  </div>
</section>

<!-- PRODUCTS -->
<section class="products" id="products">
  <h2 class="section-title">Our Products</h2>
  <div class="carousel" id="productList"></div>
</section>

<!-- CART ICON -->
<div class="cart-icon" onclick="toggleCart()">
  🛒
  <span class="cart-count" id="count">0</span>
</div>

<!-- CART BOX -->
<div class="cart-box" id="cartBox">
  <div class="cart-header">
    <h2>Your Cart (<span id="cartCount">0</span>)</h2>
    <button class="close-cart" onclick="toggleCart()">×</button>
  </div>
  
  <ul id="cartItems"></ul>
  
  <div class="total" id="totalAmount">Total: ₹0</div>
  
  <div class="form-group">
    <h3>Customer Details</h3>
    <input type="text" id="name" placeholder="Your Name *" required>
    <input type="tel" id="phone" placeholder="Phone Number *" required>
  </div>

  <button class="send-btn" id="sendBtn" onclick="sendOrder()" disabled>Send Order</button>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/9830486067?text=Hi!%20I%27m%20interested%20in%20your%20products!" target="_blank">
  💬
</a>

<script>
const products = [
  {id: 1, name: "Premium Cement Bag", price: 350, img: "https://i.ibb.co/YF5Svmwd/IMG-4768"},
  {id: 2, name: "Steel Rebar 10mm", price: 650, img: "https://i.ibb.co/m53sHvpK/IMG-4769.jpg"},
  {id: 3, name: "Sand (Per Ton)", price: 1200, img: "https://i.ibb.co/tTxk2HnR/IMG-4770.jpg"},
  {id: 4, name: "Bricks (1000 pcs)", price: 4500, img: "https://i.ibb.co/7x80zTwK/IMG-4771.jpg"},
  {id: 5, name: "PVC Pipe 2\"", price: 280, img: "https://i.ibb.co/1tYZrFZf/IMG-4772.jpg"}
];

let cart = [];

function displayProducts() {
  const list = document.getElementById("productList");
  list.innerHTML = products.map(p => `
    <div class="card">
      <img src="${p.img}" alt="${p.name}" loading="lazy">
      <h4>${p.name}</h4>
      <p>₹${p.price.toLocaleString()}</p>
      <button onclick="addToCart(${p.id})">Add to Cart</button>
    </div>
  `).join('');
}

function addToCart(productId) {
  const product = products.find(p => p.id === productId);
  const existingItem = cart.find(item => item.id === productId);
  
  if (existingItem) {
    existingItem.quantity += 1;
  } else {
    cart.push({...product, quantity: 1});
  }
  
  updateCartUI();
  showNotification(`${product.name} added to cart!`);
}

function updateCartUI() {
  const count = document.getElementById("count");
  const cartCount = document.getElementById("cartCount");
  const cartItems = document.getElementById("cartItems");
  const totalAmount = document.getElementById("totalAmount");
  const sendBtn = document.getElementById("sendBtn");
  
  count.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
  cartCount.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
  
  cartItems.innerHTML = cart.map(item => `
    <li class="cart-item">
      <div>
        <strong>${item.name}</strong><br>
        <small>₹${item.price.toLocaleString()} × ${item.quantity}</small>
      </div>
      <div>₹${(item.price * item.quantity).toLocaleString()}</div>
    </li>
  `).join('') || '<li>Your cart is empty</li>';
  
  const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
  totalAmount.textContent = `Total: ₹${total.toLocaleString()}`;
  
  sendBtn.disabled = cart.length === 0;
}

function toggleCart() {
  document.getElementById("cartBox").classList.toggle("active");
}

function scrollToProducts() {
  document.getElementById("products").scrollIntoView({behavior: 'smooth'});
}

function sendOrder() {
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  
  if (!name || !phone || cart.length === 0) {
    alert("Please fill all fields and add items to cart");
    return;
  }
  
  const orderDetails = cart.map(item => 
    `${item.name} (x${item.quantity}) - ₹${(item.price * item.quantity).toLocaleString()}`
  ).join('\n');
  
  const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
  
  const message = `New Order!\n\nCustomer: ${name}\nPhone: ${phone}\n\nOrder:\n${orderDetails}\n\nTotal: ₹${total.toLocaleString()}`;
  
  // WhatsApp fallback (works without EmailJS setup)
  window.open(`https://wa.me/9830486067?text=${encodeURIComponent(message)}`, '_blank');
  
  // Clear cart
  cart = [];
  updateCartUI();
  document.getElementById("name").value = '';
  document.getElementById("phone").value = '';
  toggleCart();
  
  showNotification("Order sent successfully! Check WhatsApp.", "success");
}

function showNotification(message, type = "info") {
  const notification = document.createElement("div");
  notification.style.cssText = `
    position: fixed;
    top: 20px;
    right: 20px;
    background: ${type === "success" ? "#28a745" : "#17a2b8"};
    color: white;
    padding: 15px 20px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    z-index: 10000;
    transform: translateX(400px);
    transition: transform 0.3s ease;
  `;
  notification.textContent = message;
  document.body.appendChild(notification);
  
  setTimeout(() => {
    notification.style.transform = "translateX(0)";
  }, 100);
  
  setTimeout(() => {
    notification.remove();
  }, 4000);
}

// Initialize
displayProducts();
updateCartUI();

// Close cart when clicking outside
document.addEventListener('click', (e) => {
  const cartBox = document.getElementById("cartBox");
  const cartIcon = document.querySelector(".cart-icon");
  if (cartBox.classList.contains('active') && !cartBox.contains(e.target) && !cartIcon.contains(e.target)) {
    toggleCart();
  }
});
</script>

</body>
</html>
